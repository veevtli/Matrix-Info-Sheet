<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toyota Matrix Info Center</title>

  <link rel="stylesheet" href="styleMain.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg"></div>
  <div class="gradient-orb"></div>
  <div class="scanlines"></div>

  <!-- Floating Particles -->
  <div class="particles"></div>

  <!-- Main Menu -->
  <div class="menu-wrapper">

    <div class="huge-text">TOYOTA MATRIX</div>

    <div class="menu-panel">

      <div class="menu-header"
        <span>Select your trim:</span>
      </div>

      <ul class="menu">

        <li>
          <a href="XRS.html" class="no-underline" style="text-decoration: none; color: inherit;">
            <button type="button" class="menu-button-XRS">X<span class="red-letter" class="menu-button-XR">RS</span></button>
          </a>
      </li>
        
        <li>
            <button type="button" class="menu-button-M" onClick="window.location.href='M.html'">M-Theory</button>
        </li>

        <li>
            <button type="button" class="menu-button-XR" onClick="window.location.href='XR.html'">X<span class="red-letter" class="menu-button-XR" onClick="window.location.href='XR.html'">R</span></button>
        </li>

        <li>
            <button type="button" class="menu-button-XR" onClick="window.location.href='BASE.html'">BASE</button>
        </li>

       

      </ul>

    </div>
  </div>

  <script src="scriptMain.js"></script>

</body>
</html>
